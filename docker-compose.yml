version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/postgres:15-alpine-linuxarm64
    container_name: flower_guardian_db
    environment:
      POSTGRES_USER: flower_user
      POSTGRES_PASSWORD: flower_password
      POSTGRES_DB: flower_guardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5555:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flower_user -d flower_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flower_network

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flower_guardian_backend
    environment:
      DATABASE_URL: postgresql://flower_user:flower_password@postgres:5555/flower_guardian
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      # 前端API地址（用于CORS）
      FRONTEND_URL: http://frontend:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_weights:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flower_network
    command: >
      sh -c "
        python -m app.db.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # React Native Web 前端 (Nginx生产部署)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flower_guardian_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - flower_network

volumes:
  postgres_data:
  model_weights:

networks:
  flower_network:
    driver: bridge
