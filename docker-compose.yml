# version: '3.8'/

services:
  # PostgreSQL 数据库
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/postgres:15-alpine #postgres:15-alpine
    container_name: flower_guardian_db
    environment:
      POSTGRES_USER: flower_user
      POSTGRES_PASSWORD: flower_password
      POSTGRES_DB: flower_guardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flower_user -d flower_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flower_network

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flower_guardian_backend
    mem_limit: 2g
    environment:
      DATABASE_URL: postgresql://flower_user:flower_password@postgres:5432/flower_guardian
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080  # 7天
      FRONTEND_URL: http://frontend:3000
      ENVIRONMENT: production
      IMAGE_STORAGE_PATH: /var/www/uploads  # 持久化存储路径
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_weights:/app/models
      - user_photos:/var/www/uploads  # 持久化用户上传图片
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flower_network
    command: >
      sh -c "
        mkdir -p /var/www/uploads static &&
        python -m app.db.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  # React Native Web 前端 (Nginx生产部署)
  #  frontend:
  # build:
  #   context: .
  #   dockerfile: frontend/Dockerfile
  # container_name: flower_guardian_frontend
  # ports:
  #- "80:80"
        # depends_on:
        # - backend
        # networks:
        #- flower_network

volumes:
  postgres_data:
  model_weights:
  user_photos:  # 用户上传图片持久化

networks:
  flower_network:
    driver: bridge
